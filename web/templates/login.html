{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flipbook</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 56px);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-error {
            background: #fecaca;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Flipbook</a>
    </nav>
    <main class="login-wrapper">
        <div class="login-card">
            <h1>Admin Login</h1>
            <p class="subtitle">Enter your password to access the admin area.</p>
            {{if .Error}}
            <div class="login-error">{{.Error}}</div>
            {{end}}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autofocus
                        style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
            </form>
        </div>
    </main>
</body>
</html>
{{end}}
