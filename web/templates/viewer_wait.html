{{define "viewer_wait"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Flipbook.Title}} - Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .wait-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            text-align: center;
            padding: 2rem;
        }
        .wait-spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wait-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .wait-msg { color: rgba(255,255,255,0.7); max-width: 400px; }
    </style>
    <meta http-equiv="refresh" content="5">
</head>
<body>
    <div class="wait-container">
        <div class="wait-spinner"></div>
        <div class="wait-title">{{.Flipbook.Title}}</div>
        <div class="wait-msg">
            This flipbook is being prepared. The page will refresh automatically.
        </div>
    </div>
</body>
</html>
{{end}}
