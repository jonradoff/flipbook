app = "flipbook-metavert"
primary_region = "iad"

[build]

[env]
  FLIPBOOK_PORT = "8080"
  FLIPBOOK_BASE_URL = "https://flipbook.metavert.io"
  FLIPBOOK_DATA_DIR = "/data"
  FLIPBOOK_MONGO_DB = "flipbook"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[mounts]
  source = "flipbook_data"
  destination = "/data"
